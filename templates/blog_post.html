<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ title }} — CheckMyVibeCode Blog</title>
<meta name="description" content="{{ description }}">
<link rel="canonical" href="{{ base_url }}/blog/{{ slug }}">
<meta property="og:type" content="article">
<meta property="og:site_name" content="CheckMyVibeCode">
<meta property="og:title" content="{{ title }}">
<meta property="og:description" content="{{ description }}">
<meta property="og:url" content="{{ base_url }}/blog/{{ slug }}">
<meta property="og:image" content="{{ og_image_url }}">
<meta property="article:published_time" content="{{ date }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ title }}">
<meta name="twitter:description" content="{{ description }}">
<meta name="twitter:image" content="{{ og_image_url }}">
<link rel="icon" type="image/png" href="/static/favicon-logo.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a09;
    --surface: #111110;
    --surface2: #161615;
    --border: #1e1e1c;
    --border2: #252523;
    --text: #f0f0ee;
    --muted: #555;
    --muted2: #888;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,.08);
    --green-border: rgba(34,197,94,.28);
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: ui-monospace, 'SF Mono', Menlo, monospace;
    --ease: cubic-bezier(.25,.46,.45,.94);
  }

  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.7; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  a { color: var(--green); text-decoration: none; }

  /* ── Header ── */
  header.site-head {
    background: rgba(17,17,16,.96);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 54px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(14px);
  }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 14px; color: var(--text); text-decoration: none; }
  .brand img { width: 26px; height: 26px; border-radius: 6px; object-fit: cover; }
  .brand .muted { color: var(--muted2); font-weight: 400; }
  .brand:hover { text-decoration: none; }
  .site-nav { display: flex; align-items: center; gap: 2px; }
  .site-nav a { color: var(--muted2); font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: 8px; transition: background .15s, color .15s; }
  .site-nav a:hover { background: var(--surface2); color: var(--text); text-decoration: none; }

  /* ── Wrap ── */
  .wrap { max-width: 720px; margin: 0 auto; padding: 48px 24px 100px; }

  /* ── Back button ── */
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--muted2);
    padding: 6px 12px; border-radius: 8px;
    border: 1px solid var(--border2); background: var(--surface);
    margin-bottom: 36px;
    transition: color .15s, border-color .15s, background .15s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--green-border); background: var(--surface2); text-decoration: none; }

  /* ── Post header ── */
  .post-header { margin-bottom: 40px; }
  .post-title {
    font-size: clamp(26px, 5vw, 46px);
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 28px;
  }

  /* Author card */
  .post-author {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px;
  }
  .post-author-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--green-bg); border: 1.5px solid var(--green-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: var(--green);
    flex-shrink: 0; letter-spacing: -.5px;
  }
  .post-author-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
  .post-author-meta { font-size: 12px; color: var(--muted2); font-family: var(--mono); display: flex; align-items: center; gap: 6px; }
  .post-author-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border2); }

  /* ── Article body ── */
  .article { font-size: 18px; color: #ccccc8; line-height: 1.85; }

  .article h1 { font-size: 30px; font-weight: 800; letter-spacing: -.6px; margin: 52px 0 18px; color: #fff; line-height: 1.15; }
  .article h1:first-child { margin-top: 0; }
  .article h2 { font-size: 24px; font-weight: 700; letter-spacing: -.4px; margin: 44px 0 16px; color: #f0f0ee; line-height: 1.2; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .article h3 { font-size: 19px; font-weight: 700; margin: 36px 0 14px; color: #f0f0ee; }
  .article h4 { font-size: 16px; font-weight: 700; margin: 28px 0 10px; color: var(--muted2); text-transform: uppercase; letter-spacing: .05em; }
  .article p { margin-bottom: 24px; }
  .article ul, .article ol { margin: 0 0 24px 26px; }
  .article li { margin-bottom: 9px; line-height: 1.7; }
  .article strong { color: #fff; font-weight: 700; }
  .article em { color: #b8b8b4; }
  .article a { color: var(--green); text-decoration: underline; text-decoration-color: rgba(34,197,94,.35); text-underline-offset: 3px; }
  .article a:hover { text-decoration-color: var(--green); }

  /* Blockquote */
  .article blockquote {
    border-left: 3px solid var(--green);
    padding: 8px 0 8px 22px;
    margin: 32px 0;
    color: #a0a09c;
    font-style: italic;
    font-size: 17px;
    line-height: 1.75;
  }

  /* Inline code */
  .article code {
    background: #161615; border: 1px solid #252523;
    padding: 2px 7px; border-radius: 6px;
    font-family: var(--mono); font-size: 15px; color: #e0e0dc;
  }

  /* Code blocks */
  .article pre {
    background: #0d0f14;
    border: 1px solid #1e2028;
    border-radius: 12px;
    padding: 22px 24px;
    overflow-x: auto;
    margin: 32px 0;
    line-height: 1.65;
    position: relative;
  }
  .article pre::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--green) 0%, transparent 100%);
    border-radius: 12px 12px 0 0;
    opacity: .6;
  }
  .article pre code {
    background: none; border: none; padding: 0;
    font-size: 14px; color: #b8c8e0;
    font-family: var(--mono);
  }

  .article hr { border: none; border-top: 1px solid var(--border); margin: 44px 0; }
  .article img { max-width: 100%; height: auto; border-radius: 12px; margin: 32px 0; border: 1px solid var(--border); display: block; }

  /* Tables */
  .article table { width: 100%; border-collapse: collapse; margin: 28px 0; font-size: 15px; }
  .article th, .article td { border: 1px solid var(--border); padding: 10px 14px; text-align: left; }
  .article th { background: var(--surface2); font-weight: 700; color: #f0f0ee; font-size: 12px; letter-spacing: .04em; text-transform: uppercase; }
  .article td { color: var(--muted2); }

  /* ── Page footer ── */
  .page-footer {
    margin-top: 72px; padding-top: 28px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .page-footer a { color: var(--muted2); transition: color .15s; }
  .page-footer a:hover { color: var(--green); text-decoration: none; }
  .footer-back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px;
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--muted2); font-size: 13px; font-weight: 500;
    transition: color .15s, border-color .15s, background .15s;
  }
  .footer-back-btn:hover { color: var(--text); border-color: var(--green-border); background: var(--surface2); text-decoration: none; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .wrap { padding: 28px 14px 80px; }
    header.site-head { padding: 0 14px; }
    .post-title { font-size: 24px; letter-spacing: -.8px; }
    .article { font-size: 16px; line-height: 1.8; }
    .article h1 { font-size: 22px; margin-top: 36px; }
    .article h2 { font-size: 19px; margin-top: 32px; }
    .article h3 { font-size: 17px; }
    .article pre { padding: 16px 16px; border-radius: 10px; font-size: 13px; }
    .article pre code { font-size: 13px; }
    .article blockquote { font-size: 16px; padding-left: 16px; }
  }
</style>
</head>
<body>

<header class="site-head">
  <a class="brand" href="/">
    <img src="/static/logo2.png" alt="CheckMyVibeCode">
    <span>checkmyvibecode<span class="muted">.com</span></span>
  </a>
  <nav class="site-nav">
    <a href="/">Projects</a>
    <a href="/blog">Blog</a>
  </nav>
</header>

<div class="wrap">

  <a class="back-btn" href="/blog">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Blog
  </a>

  <div class="post-header">
    <h1 class="post-title">{{ title }}</h1>
    <div class="post-author">
      <div class="post-author-avatar">CM</div>
      <div>
        <div class="post-author-name">CheckMyVibeCode</div>
        <div class="post-author-meta">
          <span>{{ date_human }}</span>
          <span class="dot"></span>
          <span>{{ [1, (content_html | length // 3000)] | max }} min read</span>
        </div>
      </div>
    </div>
  </div>

  <div class="article">
    {{ content_html|safe }}
  </div>

  <div class="page-footer">
    <a class="footer-back-btn" href="/blog">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      All posts
    </a>
    <a href="/">checkmyvibecode.com →</a>
  </div>

</div>

</body>
</html>
